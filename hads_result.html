<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ผลแบบสอบถาม HADS</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--teal:#0d7c8f;--teal-light:#e6f4f7;--teal-mid:#1a9db3;--navy:#0a2f3f;--bg:#f0f6f8;--gray-100:#f0f4f7;--gray-200:#dde4ea;--gray-400:#8fa3b1;--gray-700:#3a4f5c;--text:#1a2e38;--radius:18px;--A:#0d7c8f;--D:#7c3aed}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Sarabun',sans-serif;color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-bottom:48px}
.topbar{width:100%;background:linear-gradient(135deg,var(--navy),var(--teal));padding:18px 20px 16px;text-align:center;color:white}
.topbar .clinic{font-size:11px;opacity:0.7;margin-bottom:4px}
.topbar h1{font-size:17px;font-weight:700}
.card-wrap{width:100%;max-width:440px;padding:20px 16px 0;display:flex;flex-direction:column;gap:14px}

/* ===== PATIENT VIEW ===== */
.thanks-card{background:white;border-radius:var(--radius);padding:36px 24px;text-align:center;box-shadow:0 4px 24px rgba(13,124,143,0.10)}
.checkmark{width:80px;height:80px;background:linear-gradient(135deg,#d1fae5,#a7f3d0);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:38px}
.thanks-card h2{font-size:24px;font-weight:800;color:var(--navy);margin-bottom:10px}
.thanks-card p{font-size:14.5px;color:var(--gray-700);line-height:1.8}
.pt-info{font-size:12px;color:var(--gray-400);text-align:center;padding:8px 0 0}

/* ===== CLINICIAN VIEW (hidden by default) ===== */
.clinician-wrap{display:none;flex-direction:column;gap:14px;width:100%}
.clinician-wrap.show{display:flex}

.cp-title{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--teal);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.cp-title::after{content:'';flex:1;height:1px;background:var(--gray-200)}

/* Score cards */
.scores-row{display:flex;gap:12px}
.score-half{flex:1;background:white;border-radius:var(--radius);padding:22px 16px;text-align:center;box-shadow:0 4px 24px rgba(13,124,143,0.10)}
.score-half .label-top{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px}
.score-half.anxiety .label-top{color:var(--A)}
.score-half.depression .label-top{color:var(--D)}
.big-circle{width:100px;height:100px;border-radius:50%;margin:0 auto 14px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.big-circle .num{font-size:36px;font-weight:800;line-height:1}
.big-circle .denom{font-size:12px;font-weight:500;opacity:0.6;margin-top:2px}
.sev-none{background:#dcfce7;color:#15803d}
.sev-doubtful{background:#fef9c3;color:#a16207}
.sev-case{background:#fee2e2;color:#b91c1c}
.sev-name{font-size:15px;font-weight:800;margin-bottom:4px}
.sev-range{font-size:11px;color:var(--gray-400);margin-bottom:12px}
.sev-bar-wrap{margin:0 0 12px}
.sev-bar-track{height:8px;border-radius:10px;overflow:hidden;background:var(--gray-200)}
.sev-bar-fill{height:100%;border-radius:10px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.sev-bar-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--gray-400);margin-top:4px;font-weight:600}
.meaning-box{background:var(--bg);border-radius:10px;padding:12px 14px;font-size:12.5px;line-height:1.7;color:var(--gray-700);text-align:left}
.meaning-box strong{color:var(--navy)}

/* Summary detail card */
.summary-card{background:white;border-radius:var(--radius);padding:20px;box-shadow:0 4px 24px rgba(13,124,143,0.10)}
.sum-row{display:flex;gap:10px;margin-bottom:14px}
.sum-box{flex:1;border-radius:10px;padding:14px 10px;text-align:center}
.sum-box.A{background:#e0f5f8}.sum-box.D{background:#f5f3ff}
.sum-box .sv{font-size:26px;font-weight:800;display:block}
.sum-box.A .sv{color:var(--A)}.sum-box.D .sv{color:var(--D)}
.sum-box .sn{font-size:10px;font-weight:700;opacity:0.65;display:block;margin-top:2px}
.sum-box .sl{font-size:11px;opacity:0.6}
.ans-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:8px}
.ans-chip{border-radius:6px;padding:6px 4px;text-align:center;font-size:11px;font-weight:700}
.ans-chip .qid{display:block;opacity:0.6;font-size:9px}
.ans-chip.A-chip{background:#e0f5f8;color:var(--A)}
.ans-chip.D-chip{background:#f5f3ff;color:var(--D)}

.btn-csv{width:100%;padding:14px;background:var(--teal);color:white;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;margin-top:14px;transition:background 0.2s}
.btn-csv:hover{background:var(--navy)}

.clinician-badge{background:linear-gradient(135deg,var(--navy),var(--teal));border-radius:var(--radius);padding:14px 20px;color:white;text-align:center;font-size:13px;font-weight:600;opacity:0.85}
</style>
</head>
<body>
<div class="topbar">
  <div class="clinic">แบบประเมินสุขภาพจิต · HADS Thai Version</div>
  <h1>ผลแบบสอบถาม HADS</h1>
</div>

<div class="card-wrap">

  <!-- ===== PATIENT VIEW: always shown ===== -->
  <div class="thanks-card">
    <div class="checkmark">✅</div>
    <h2>ขอบคุณค่ะ</h2>
    <p>ตอบแบบสอบถาม HADS ครบ 14 ข้อแล้ว<br>กรุณาคืนอุปกรณ์ให้เจ้าหน้าที่</p>
    <p class="pt-info" id="pt-info"></p>
  </div>

  <!-- ===== CLINICIAN VIEW: shown only with #clinician ===== -->
  <div class="clinician-wrap" id="clinician-wrap">

    <div class="clinician-badge">🩺 Clinician View</div>

    <!-- Dual score cards -->
    <div class="scores-row">
      <div class="score-half anxiety">
        <div class="label-top">Anxiety Score</div>
        <div class="big-circle" id="a-circle">
          <span class="num" id="a-num">–</span>
          <span class="denom">/ 21</span>
        </div>
        <div class="sev-name" id="a-sev-name"></div>
        <div class="sev-range" id="a-sev-range"></div>
        <div class="sev-bar-wrap">
          <div class="sev-bar-track"><div class="sev-bar-fill" id="a-bar" style="width:0%"></div></div>
          <div class="sev-bar-labels"><span>0</span><span>7</span><span>10</span><span>21</span></div>
        </div>
        <div class="meaning-box" id="a-meaning"></div>
      </div>
      <div class="score-half depression">
        <div class="label-top">Depression Score</div>
        <div class="big-circle" id="d-circle">
          <span class="num" id="d-num">–</span>
          <span class="denom">/ 21</span>
        </div>
        <div class="sev-name" id="d-sev-name"></div>
        <div class="sev-range" id="d-sev-range"></div>
        <div class="sev-bar-wrap">
          <div class="sev-bar-track"><div class="sev-bar-fill" id="d-bar" style="width:0%"></div></div>
          <div class="sev-bar-labels"><span>0</span><span>7</span><span>10</span><span>21</span></div>
        </div>
        <div class="meaning-box" id="d-meaning"></div>
      </div>
    </div>

    <!-- Detail card -->
    <div class="summary-card">
      <div class="cp-title">รายละเอียด</div>
      <div class="sum-row">
        <div class="sum-box A"><span class="sv" id="sum-a">–</span><span class="sn">ANXIETY</span><span class="sl">คะแนน /21</span></div>
        <div class="sum-box D"><span class="sv" id="sum-d">–</span><span class="sn">DEPRESSION</span><span class="sl">คะแนน /21</span></div>
      </div>
      <div class="cp-title" style="margin-top:0">คำตอบรายข้อ</div>
      <div class="ans-grid" id="ans-grid"></div>
      <button class="btn-csv" onclick="downloadCSV()">⬇ ดาวน์โหลด CSV</button>
    </div>

  </div><!-- /clinician-wrap -->
</div>

<script>
const questions = [
  {id:'A1',num:1,type:'A'},{id:'D2',num:2,type:'D'},{id:'A3',num:3,type:'A'},{id:'D4',num:4,type:'D'},
  {id:'A5',num:5,type:'A'},{id:'D6',num:6,type:'D'},{id:'A7',num:7,type:'A'},{id:'D8',num:8,type:'D'},
  {id:'A9',num:9,type:'A'},{id:'D10',num:10,type:'D'},{id:'A11',num:11,type:'A'},{id:'D12',num:12,type:'D'},
  {id:'A13',num:13,type:'A'},{id:'D14',num:14,type:'D'}
];

const p = new URLSearchParams(window.location.search);
const get = k => p.get(k)||'';
const name=get('name'), hn=get('hn'), date=get('date'), vr=get('vr');
const totalA=parseInt(get('A'))||0, totalD=parseInt(get('D'))||0;

// Patient info line (always shown)
const parts=[]; if(name)parts.push(name); if(hn)parts.push('HN: '+hn); if(date)parts.push(date);
document.getElementById('pt-info').textContent=parts.join(' · ');

function getSeverity(score){
  if(score<=7) return {cls:'sev-none',name:'Normal',range:'0–7 (ปกติ)',color:'#16a34a',meaning:'<strong>ปกติ</strong> — คะแนนอยู่ในเกณฑ์ปกติ'};
  if(score<=10) return {cls:'sev-doubtful',name:'Doubtful Case',range:'8–10 (ไม่แน่ชัด)',color:'#d97706',meaning:'<strong>Doubtful Case</strong> — คะแนนอยู่ในเกณฑ์ที่ควรติดตาม'};
  return {cls:'sev-case',name:'Case',range:'11–21 (มีปัญหา)',color:'#dc2626',meaning:'<strong>Case</strong> — คะแนนบ่งชี้ว่ามีปัญหาที่ควรได้รับการดูแล'};
}

function applyScore(scoreId, circleId, sevNameId, sevRangeId, barId, meaningId, score){
  const s = getSeverity(score);
  document.getElementById(scoreId).textContent = score;
  document.getElementById(circleId).className = 'big-circle '+s.cls;
  document.getElementById(sevNameId).textContent = s.name;
  document.getElementById(sevRangeId).textContent = s.range;
  document.getElementById(meaningId).innerHTML = s.meaning;
  const bar = document.getElementById(barId);
  bar.style.background = s.color;
  setTimeout(()=>{ bar.style.width = Math.min(score/21*100,100)+'%'; },100);
}

// Show clinician view only if #clinician in URL
if(window.location.hash === '#clinician'){
  document.getElementById('clinician-wrap').classList.add('show');
  applyScore('a-num','a-circle','a-sev-name','a-sev-range','a-bar','a-meaning',totalA);
  applyScore('d-num','d-circle','d-sev-name','d-sev-range','d-bar','d-meaning',totalD);
  document.getElementById('sum-a').textContent = totalA;
  document.getElementById('sum-d').textContent = totalD;
  document.getElementById('ans-grid').innerHTML = questions.map(q => {
    const val = parseInt(get(q.id))||0;
    return `<div class="ans-chip ${q.type}-chip"><span class="qid">${q.num}</span>${val}</div>`;
  }).join('');
}

const sevAName = getSeverity(totalA).name;
const sevDName = getSeverity(totalD).name;

function downloadCSV(){
  let csv = '\uFEFF';
  csv += 'ชื่อ-นามสกุล,HN,วันที่,VR#,'+questions.map(q=>'Q'+q.num+'('+q.type+')').join(',')+',Anxiety Score,Anxiety Severity,Depression Score,Depression Severity\n';
  csv += `"${name}","${hn}","${date}","${vr}",`;
  csv += questions.map(q=>parseInt(get(q.id))||0).join(',');
  csv += `,${totalA},"${sevAName}",${totalD},"${sevDName}"\n`;
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`HADS_${name||'result'}_${date||'today'}.csv`; a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
